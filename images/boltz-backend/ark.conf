# Appended to boltz.conf only when the Ark stack is running (see
# images/boltz-backend/entrypoint.sh). Keep the ARK pair here too: it depends
# on fulmine, so the backend must not see it when Ark is not configured.

[ark]
host = "fulmine"
port = 7000
macaroonpath = "/data/fulmine/macaroons/admin.macaroon"

useLocktimeSeconds = true
rescanInterval = 30

  [ark.unilateralDelays]
  claim = 444
  refund = 444
  refundWithoutReceiver = 720

[[pairs]]
base = "ARK"
quote = "BTC"
rate = 1
fee = 0.4
swapInFee = 0.01
invoiceExpiry = 3600
maxSwapAmount = 4_294_967
minSwapAmount = 1_000

  [pairs.timeoutDelta]
  chain = 1440
  reverse = 1440
  swapMinimal = 1440
  swapMaximal = 2880
  swapTaproot = 10080
