# Appended to boltz.conf only when the Arbitrum stack is running
# (see images/boltz-backend/entrypoint.sh). Keep the TBTC pair here too: it
# depends on the Arbitrum chain, so the backend must not see it when Arbitrum
# is not configured ("no block time for symbol: TBTC").

[[pairs]]
base = "TBTC"
quote = "L-BTC"
rate = 1
fee = 0
swapInFee = 0

# Large values make the bridge limit quote run out of gas.
maxSwapAmount = 1_000_000
minSwapAmount = 2_500

swapTypes = ["chain"]

  [pairs.chainSwap]
  buyFee = 0
  sellFee = 0

  minSwapAmount = 25_000

  [pairs.timeoutDelta]
  chain = 1440
  reverse = 1440
  swapMinimal = 1440
  swapMaximal = 2880
  swapTaproot = 10080

[arbitrum]
networkName = "Arbitrum"
providerEndpoint = "ws://anvil-arb:8545"
requiredConfirmations = 1
# Fall back to the L2 block number when anvil omits l1BlockNumber
regtest = true

 [[arbitrum.contracts]]
 etherSwap = "0xc09247F837A205BDdE43960Ca01BDea426F1370e"
 erc20Swap = "0x6398B76DF91C5eBe9f488e3656658E79284dDc0F"

 [[arbitrum.tokens]]
 symbol = "TBTC"
 decimals = 18
 contractAddress = "0x6c84a8f1c29108F47a79964b5Fe888D4f4D0dE40"

 maxSwapAmount = 4_294_96700
 minSwapAmount = 10000

 minWalletBalance = 0

 [arbitrum.quoters]
 weth = "0x82aF49447D8a07e3bd95BD0d56f35241523fBab1"

 [arbitrum.quoters.uniswapV3]
 factory = "0x1F98431c8aD98523631AE4a59f267346ea31F984"
 quoter = "0x61fFE014bA17989E743c5F6cB21bF9697530B21e"
 router = "0xa51afafe0263b40edaef0df8781ea9aa03e381a3"
 liquidTokens = ["0x82aF49447D8a07e3bd95BD0d56f35241523fBab1"]
